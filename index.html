<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extractor de Planillas</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1>Extractor de Planillas</h1>
    <p class="muted">Sube fotos de planillas y genera un Excel con los datos.</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Subir archivos</h2>
      <input id="fileInput" type="file" accept="image/*" multiple />
      <div class="row">
        <button class="button" onclick="procesar()">Procesar</button>
        <button class="button success" onclick="descargarExcel()">Descargar Excel</button>
      </div>
      <div id="progress" class="progress"></div>
    </section>

    <section class="card">
      <h2>Resultados OCR</h2>
      <pre id="output"></pre>
    </section>
  </main>

  <footer class="app-footer">
    <small>Hecho por Christopher ✨</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
